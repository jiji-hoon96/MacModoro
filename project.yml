name: MacModoro
options:
  bundleIdPrefix: com.macmodoro
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  MacModoro:
    type: application
    platform: macOS
    sources:
      - MacModoro
    settings:
      base:
        INFOPLIST_FILE: MacModoro/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacModoro/MacModoro.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.macmodoro.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_NAME: MacModoro
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: MacModoro/MacModoro.entitlements
